<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_title }} - Usenet Crawl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grain"></div>
    <main class="shell">
      <header class="topbar panel">
        <div class="brand">
          <a href="/" class="nav-brand" style="margin-bottom: 12px;">
            <span class="brand-icon">✨</span>
            <span class="brand-text">Majic</span>
          </a>
          <p class="kicker">Indexer Crawl</p>
          <h1>Usenet Releases</h1>
          <p class="subtext">Manual crawl across configured indexers with source attribution.</p>
        </div>
        <div class="controls">
          <a class="nav-link" href="/">Back to Recommendations</a>
          <a class="nav-link" href="/integrations">Integrations</a>
          <button id="crawl-now" class="secondary">Crawl Now</button>
        </div>
      </header>

      <section class="panel usenet-panel">
        <div class="panel-head">
          <h2>Release Feed</h2>
          <span id="crawl-meta" class="muted"></span>
        </div>
        <div class="usenet-controls">
          <label>
            Search
            <input id="release-search" type="text" placeholder="Title, indexer, year, raw release..." />
          </label>
          <label>
            Sort
            <select id="release-sort">
              <option value="newest" selected>Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="title">Title A-Z</option>
            </select>
          </label>
        </div>
        <p id="crawl-errors" class="muted"></p>
        <div class="table-wrap">
          <table class="release-table">
            <thead>
              <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Year</th>
                <th>RT Score</th>
                <th>Indexer</th>
                <th>Released</th>
                <th>Where</th>
                <th>Raw Release</th>
              </tr>
            </thead>
            <tbody id="release-rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/static/usenet.js" defer></script>
  </body>
</html>
