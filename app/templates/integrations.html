<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_title }} - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #333;
      --text: #f5f5f5;
      --text-dim: #888;
      --accent: #e50914;
      --accent-hover: #f6121d;
      --green: #46d369;
      --yellow: #f5c518;
      --blue: #0080ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: block;
    }

    .nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active { color: var(--text); }

    /* Main */
    .main {
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Form Elements */
    .form-grid {
      display: grid;
      gap: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 140px 1fr 100px;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface-2);
      border-radius: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-success {
      background: var(--green);
      color: black;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-badge.success {
      background: rgba(70, 211, 105, 0.2);
      color: var(--green);
    }

    .status-badge.error {
      background: rgba(229, 9, 20, 0.2);
      color: var(--accent);
    }

    .status-badge.pending {
      background: rgba(136, 136, 136, 0.2);
      color: var(--text-dim);
    }

    /* Integration Row */
    .integration-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      background: var(--surface-2);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .integration-name {
      font-weight: 600;
      font-size: 14px;
    }

    .integration-fields {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .integration-field {
      flex: 1;
      min-width: 200px;
    }

    .integration-actions {
      display: flex;
      gap: 8px;
    }

    .integration-verbose {
      grid-column: 1 / -1;
      margin-top: 10px;
      padding: 10px 12px;
      background: #121212;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #cfd3dc;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    /* Ollama extras */
    .ollama-model-field {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ollama-model-select {
      flex: 1;
    }

    .ollama-extras {
      background: var(--surface-2);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      margin-top: -8px;
      border-top: 1px dashed var(--border);
    }

    .ollama-models-list {
      margin-bottom: 12px;
    }

    .models-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .model-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .model-item.active-model {
      border: 1px solid var(--primary);
      background: color-mix(in srgb, var(--primary) 10%, var(--bg));
    }

    .model-name {
      font-weight: 500;
      color: var(--text);
    }

    .model-info {
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
    }

    .no-models {
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
      padding: 12px;
      text-align: center;
    }

    .ollama-pull-section {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .ollama-pull-section input {
      flex: 1;
    }

    .ollama-pull-status {
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .ollama-pull-status .loading {
      color: var(--yellow);
    }

    .ollama-pull-status .success {
      color: var(--green);
    }

    .ollama-pull-status .error {
      color: var(--accent);
    }

    .ollama-suggestions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    .btn-xs {
      padding: 4px 8px;
      font-size: 11px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-ghost:hover {
      background: var(--border);
      color: var(--text);
    }

    /* Feedback */
    .feedback {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 16px;
    }

    .feedback.success {
      background: rgba(70, 211, 105, 0.15);
      color: var(--green);
    }

    .feedback.error {
      background: rgba(229, 9, 20, 0.15);
      color: var(--accent);
    }

    /* Seen Movies Section */
    .seen-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .seen-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .seen-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface-2);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .seen-item-info {
      display: flex;
      flex-direction: column;
    }

    .seen-item-title {
      font-weight: 500;
    }

    .seen-item-meta {
      font-size: 12px;
      color: var(--text-dim);
    }

    .plex-library {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .plex-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--surface-2);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .plex-item:hover {
      background: var(--border);
    }

    .plex-item.selected {
      background: rgba(229, 9, 20, 0.2);
      border: 1px solid var(--accent);
    }

    .plex-item input[type="checkbox"] {
      accent-color: var(--accent);
    }

    /* Two Column Layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) {
      .two-col {
        grid-template-columns: 1fr;
      }
      .integration-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="/" class="logo">
      <img src="/static/logo.svg?v=20260219e" alt="Majic" />
      <span>{{ app_title }}</span>
    </a>
    <nav class="nav">
      <a href="/">Movies</a>
      <a href="/tv">TV Station</a>
      <a href="/usenet">Usenet</a>
      <a href="/integrations" class="active">Settings</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="main">
    <h1 class="page-title">Settings</h1>
    <p class="page-subtitle">Configure integrations and manage your watched movies</p>

    <!-- Integration Settings -->
    <div class="card">
      <div class="card-title">
        <span>Integrations</span>
        <button class="btn btn-primary" id="save-settings">Save All Settings</button>
      </div>

      <div id="integration-list">
        <!-- Integrations will be loaded here -->
      </div>

      <div id="settings-feedback"></div>
    </div>

    <!-- Server Configurations (Plex/Radarr) -->
    <div class="card">
      <div class="card-title">
        <span>Plex Servers</span>
        <button class="btn btn-primary btn-sm" onclick="openServerModal('plex')">+ Add Plex Server</button>
      </div>
      <div id="plex-servers-list">
        <p style="color: var(--text-dim); text-align: center; padding: 20px;">Loading...</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>Radarr Servers</span>
        <button class="btn btn-primary btn-sm" onclick="openServerModal('radarr')">+ Add Radarr Server</button>
      </div>
      <div id="radarr-servers-list">
        <p style="color: var(--text-dim); text-align: center; padding: 20px;">Loading...</p>
      </div>
    </div>

    <!-- Server Modal -->
    <div id="server-modal" class="modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
      <div class="card" style="width:100%; max-width:500px; margin:auto;">
        <div class="card-title">
          <span id="server-modal-title">Add Server</span>
          <button class="btn btn-secondary btn-sm" onclick="closeServerModal()">&times;</button>
        </div>
        <form id="server-form">
          <input type="hidden" id="server-edit-id">
          <input type="hidden" id="server-type">
          <div style="display:flex; flex-direction:column; gap:12px;">
            <div>
              <label class="form-label">Name</label>
              <input type="text" class="form-input" id="server-name" placeholder="e.g., Home Plex" required>
            </div>
            <div>
              <label class="form-label">Base URL</label>
              <input type="text" class="form-input" id="server-url" placeholder="http://localhost:32400" required>
            </div>
            <div>
              <label class="form-label" id="server-key-label">Token/API Key</label>
              <input type="password" class="form-input" id="server-key" placeholder="Token or API Key">
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="server-default">
              <label for="server-default" style="font-size:13px;">Set as default</label>
            </div>
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button type="submit" class="btn btn-primary" style="flex:1;">Save</button>
              <button type="button" class="btn btn-secondary" onclick="closeServerModal()">Cancel</button>
            </div>
          </div>
        </form>
        <div id="server-form-feedback" style="margin-top:12px;"></div>
      </div>
    </div>

    <div class="two-col">
      <!-- Seen Movies -->
      <div class="card">
        <div class="card-title">
          <span>Seen Movies</span>
          <button class="btn btn-secondary btn-sm" id="refresh-seen">Refresh</button>
        </div>

        <div class="seen-controls">
          <input type="text" class="form-input" id="seen-search" placeholder="Search seen movies..." style="flex:1;">
          <button class="btn btn-secondary" id="import-plex">Import from Plex</button>
        </div>

        <div id="seen-feedback"></div>
        <div class="seen-list" id="seen-list">
          <p style="color: var(--text-dim); text-align: center; padding: 20px;">Loading...</p>
        </div>
      </div>

      <!-- Add Movie Manually -->
      <div class="card">
        <div class="card-title">Add Movie Manually</div>

        <form id="manual-form">
          <div style="display: flex; gap: 12px; margin-bottom: 16px;">
            <input type="text" class="form-input" id="manual-title" placeholder="Movie title" required style="flex: 2;">
            <input type="number" class="form-input" id="manual-year" placeholder="Year" min="1888" max="2100" style="flex: 1;">
          </div>
          <button type="submit" class="btn btn-primary">Add to Seen List</button>
        </form>

        <div style="margin-top: 24px;">
          <div class="card-title" style="margin-bottom: 12px;">
            <span>Plex Library</span>
            <button class="btn btn-secondary btn-sm" id="load-plex">Load Library</button>
          </div>
          <div class="plex-library" id="plex-library">
            <p style="color: var(--text-dim); text-align: center; padding: 20px;">Click "Load Library" to see your Plex movies</p>
          </div>
          <button class="btn btn-success" id="add-selected-plex" style="width: 100%; margin-top: 12px;">Add Selected to Seen</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const INTEGRATIONS = [
      { key: 'google', label: 'Google Sign-In', fields: [
        { name: 'google_client_id', label: 'Client ID', type: 'text' },
        { name: 'google_client_secret', label: 'Client Secret', type: 'password' }
      ]},
      { key: 'tmdb', label: 'TMDB', fields: [{ name: 'tmdb_api_key', label: 'API Key', type: 'password' }] },
      { key: 'rottentomatoes', label: 'Rotten Tomatoes', fields: [{ name: 'rottentomatoes_list_url', label: 'List URL', type: 'text' }] },
      { key: 'rogerebert', label: 'RogerEbert', fields: [{ name: 'rogerebert_reviews_url', label: 'Reviews URL', type: 'text' }] },
      { key: 'releases', label: 'Releases', fields: [{ name: 'releases_url', label: 'URL', type: 'text' }] },
      { key: 'nzbgeek', label: 'NZBGeek', fields: [
        { name: 'nzbgeek_rss_url', label: 'RSS URL', type: 'text' },
        { name: 'nzbgeek_api_key', label: 'API Key', type: 'password' }
      ]},
      { key: 'drunkenslug', label: 'DrunkenSlug', fields: [
        { name: 'drunkenslug_base_url', label: 'Base URL', type: 'text' },
        { name: 'drunkenslug_api_key', label: 'API Key', type: 'password' }
      ]},
      { key: 'usenet', label: 'Usenet/NZBHydra', fields: [
        { name: 'usenet_base_url', label: 'Base URL', type: 'text' },
        { name: 'usenet_api_key', label: 'API Key', type: 'password' }
      ]},
      { key: 'groq', label: 'Groq Cloud (Free AI)', fields: [
        { name: 'groq_api_key', label: 'API Key', type: 'password' },
        { name: 'groq_model', label: 'Model', type: 'text' }
      ]},
      { key: 'ollama', label: 'Ollama (Local AI)', fields: [
        { name: 'ollama_base_url', label: 'Base URL', type: 'text' },
        { name: 'ollama_model', label: 'Model', type: 'text' }
      ]}
    ];

    let currentSettings = {};
    let integrationStatus = {};
    let integrationVerboseResults = {};

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#96;');
    }

    function getAuthHeaders(extra = {}) {
      const headers = { ...extra };
      const token = localStorage.getItem('majic_auth_token');
      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }
      return headers;
    }

    function getUserId() {
      let id = localStorage.getItem('majic_user_id');
      if (!id) {
        id = 'user-' + Math.random().toString(36).slice(2);
        localStorage.setItem('majic_user_id', id);
      }
      return id;
    }

    function collectIntegrationValues() {
      const values = {};
      INTEGRATIONS.forEach(int => {
        int.fields.forEach(field => {
          const el = document.getElementById(field.name);
          values[field.name] = el ? String(el.value || '').trim() : '';
        });
      });
      return values;
    }

    function integrationHasInput(int, values) {
      return int.fields.some(field => String(values[field.name] || '').trim() !== '');
    }

    async function requestIntegrationTest(key, values) {
      const res = await fetch('/api/integrations/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ integration: key, values })
      });
      const data = await res.json();
      return {
        ok: !!data.ok,
        message: data.message || '',
        details: data.details || null,
        integration: data.integration || key,
        statusCode: res.status
      };
    }

    function maskFieldValue(fieldName, value) {
      const text = String(value || '');
      const lowered = fieldName.toLowerCase();
      const sensitive = lowered.includes('key') || lowered.includes('token') || lowered.includes('password');
      if (!sensitive) return text || '(empty)';
      if (!text) return '(empty)';
      if (text.length <= 6) return '*'.repeat(text.length);
      return `${text.slice(0, 3)}***${text.slice(-2)}`;
    }

    function renderVerboseOutput(key, result) {
      const row = document.querySelector(`.integration-row[data-integration-key="${key}"]`);
      if (!row || !result) return;

      let block = row.querySelector('.integration-verbose');
      if (!block) {
        block = document.createElement('pre');
        block.className = 'integration-verbose';
        row.appendChild(block);
      }

      const testedAt = result.testedAt || new Date().toISOString();
      const payload = result.values || {};
      const integration = INTEGRATIONS.find(item => item.key === key);
      const fieldLines = (integration?.fields || [])
        .map(field => `  - ${field.name}: ${maskFieldValue(field.name, payload[field.name])}`)
        .join('\n');

      const detailsText = result.details
        ? `\nDetails:\n${JSON.stringify(result.details, null, 2)}`
        : '';

      block.textContent =
`Test: ${result.integration || key}
Time: ${testedAt}
HTTP: ${result.statusCode || 'n/a'}
Result: ${result.ok ? 'PASS' : 'FAIL'}
Message: ${result.message || '(none)'}
Input:
${fieldLines || '  (no fields)'}${detailsText}`;
    }

    async function computeIntegrationStatus(values) {
      const results = {};
      for (const int of INTEGRATIONS) {
        if (!integrationHasInput(int, values)) {
          results[int.key] = null;
          continue;
        }
        try {
          const tested = await requestIntegrationTest(int.key, values);
          results[int.key] = tested.ok;
        } catch {
          results[int.key] = false;
        }
      }
      return results;
    }

    async function loadSettings() {
      try {
        const settingsRes = await fetch('/api/settings');
        const settingsData = await settingsRes.json();

        currentSettings = settingsData.values || {};
        integrationStatus = {};
        renderIntegrations();
        integrationStatus = await computeIntegrationStatus(currentSettings);
        renderIntegrations();
      } catch (e) {
        console.error('Failed to load settings:', e);
      }
    }

    function renderIntegrations() {
      const container = document.getElementById('integration-list');
      container.innerHTML = INTEGRATIONS.map(int => {
        const status = integrationStatus[int.key];
        const hasInput = integrationHasInput(int, currentSettings);
        const statusClass = status === true ? 'success' : status === false ? 'error' : 'pending';
        const statusText = status === true
          ? 'Connected'
          : status === false
            ? 'Test failed'
            : hasInput
              ? 'Needs test'
              : 'Not configured';
        const label = escapeHtml(int.label);

        // Special handling for Groq with model selector
        if (int.key === 'groq') {
          const groqApiKey = escapeAttr(currentSettings['groq_api_key'] || '');
          const groqModel = String(currentSettings['groq_model'] || 'llama-3.3-70b-versatile');
          const groqModelEscaped = escapeHtml(groqModel);

          return `
            <div class="integration-row groq-row" data-integration-key="${int.key}">
              <div>
                <div class="integration-name">${label}</div>
                <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="integration-fields">
                <div class="integration-field">
                  <input type="password" class="form-input"
                         id="groq_api_key"
                         placeholder="API Key (from console.groq.com)"
                         value="${groqApiKey}">
                </div>
                <div class="integration-field ollama-model-field">
                  <select id="groq_model" class="form-input ollama-model-select">

    async function refreshOllamaModels() {
      const select = document.getElementById('ollama_model');
      const listEl = document.getElementById('ollama-models-list');
      if (!select) return;

      try {
        const res = await fetch('/api/ollama/models');
        const data = await res.json();

        if (data.ok && data.models.length > 0) {
          const currentModel = String(data.current_model || currentSettings['ollama_model'] || '');
          const normalizeModel = (value) => String(value || '').trim().toLowerCase();
          const currentModelNorm = normalizeModel(currentModel);
          const isCurrentModel = (name) => {
            const normalized = normalizeModel(name);
            if (!normalized || !currentModelNorm) return false;
            if (normalized === currentModelNorm) return true;
            if (!currentModelNorm.includes(':')) return normalized.split(':')[0] === currentModelNorm;
            return false;
          };
          select.innerHTML = '';

          for (const model of data.models) {
            const name = String(model.name || model.model || '').trim();
            if (!name) continue;
            const sizeBytes = Number(model.size || 0);
            const size = Number.isFinite(sizeBytes) && sizeBytes > 0
              ? `${(sizeBytes / 1e9).toFixed(1)}GB`
              : 'n/a';

            const option = document.createElement('option');
            option.value = name;
            option.textContent = `${name} (${size})`;
            option.selected = isCurrentModel(name);
            select.appendChild(option);
          }

          if (!select.options.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No models found';
            select.appendChild(option);
          }

          if (listEl) {
            listEl.innerHTML = '';
            const header = document.createElement('div');
            header.className = 'models-header';
            header.textContent = 'Installed Models:';
            listEl.appendChild(header);

            for (const model of data.models) {
              const name = String(model.name || model.model || '').trim();
              if (!name) continue;
              const sizeBytes = Number(model.size || 0);
              const size = Number.isFinite(sizeBytes) && sizeBytes > 0
                ? `${(sizeBytes / 1e9).toFixed(1)}GB`
                : 'n/a';
              const params = String(model.details?.parameter_size || '');
              const active = isCurrentModel(name);

              const row = document.createElement('div');
              row.className = 'model-item';
              if (active) row.classList.add('active-model');

              const nameEl = document.createElement('span');
              nameEl.className = 'model-name';
              nameEl.textContent = name;

              const infoEl = document.createElement('span');
              infoEl.className = 'model-info';
              infoEl.textContent = params ? `${params} · ${size}` : size;

              const button = document.createElement('button');
              button.className = 'btn btn-ghost btn-xs';
              button.type = 'button';
              button.textContent = active ? 'Using' : 'Use';
              button.disabled = active;
              button.addEventListener('click', () => selectOllamaModel(name));

              row.appendChild(nameEl);
              row.appendChild(infoEl);
              row.appendChild(button);
              listEl.appendChild(row);
            }
          }
        } else {
          select.innerHTML = '';
          const option = document.createElement('option');
          option.value = '';
          option.textContent = 'No models found';
          select.appendChild(option);
          if (listEl) {
            listEl.innerHTML = '';
            const msg = document.createElement('div');
            msg.className = 'no-models';
            msg.textContent = 'No models installed. Pull one below.';
            listEl.appendChild(msg);
          }
        }
      } catch (e) {
        select.innerHTML = '';
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'Error loading models';
        select.appendChild(option);
        if (listEl) {
          listEl.innerHTML = '';
          const msg = document.createElement('div');
          msg.className = 'no-models';
          msg.textContent = 'Could not connect to Ollama';
          listEl.appendChild(msg);
        }
      }
    }

    function setOllamaStatus(level, message) {
      const statusEl = document.getElementById('ollama-pull-status');
      if (!statusEl) return;
      statusEl.innerHTML = '';
      const span = document.createElement('span');
      span.className = level;
      span.textContent = message;
      statusEl.appendChild(span);
    }

    async function selectOllamaModel(modelName) {
      const model = String(modelName || '').trim();
      if (!model) return;

      setOllamaStatus('loading', `Switching to ${model}...`);

      try {
        const res = await fetch('/api/ollama/model', {
          method: 'POST',
          headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ model })
        });
        const data = await res.json();
        if (!data.ok) {
          setOllamaStatus('error', data.message || `Failed to use ${model}`);
          return;
        }

        currentSettings['ollama_model'] = data.model || model;
        const select = document.getElementById('ollama_model');
        if (select) select.value = currentSettings['ollama_model'];
        setOllamaStatus('success', data.message || `Active model: ${currentSettings['ollama_model']}`);
        await refreshOllamaModels();
      } catch (e) {
        setOllamaStatus('error', `Failed to use model: ${e.message}`);
      }
    }

    function selectOllamaModelInField(modelName) {
      const select = document.getElementById('ollama_model');
      if (select) {
        select.value = modelName;
        currentSettings['ollama_model'] = modelName;
      }
    }

    async function pullOllamaModel(modelName) {
      const input = document.getElementById('ollama-pull-input');
      const model = modelName || (input ? input.value.trim() : '');

      if (!model) {
        setOllamaStatus('error', 'Enter a model name');
        return;
      }

      setOllamaStatus('loading', `Pulling ${model}... (this may take a while)`);

      try {
        const res = await fetch('/api/ollama/pull', {
          method: 'POST',
          headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ model })
        });
        const data = await res.json();

        if (res.status === 401 || res.status === 403) {
          setOllamaStatus('error', 'Login required to pull models');
          return;
        }

        if (data.ok) {
          setOllamaStatus('success', data.message || `Pulled ${model}`);
          if (input) input.value = '';
          if (data.model) {
            currentSettings['ollama_model'] = data.model;
            selectOllamaModelInField(data.model);
          }
          refreshOllamaModels();
        } else {
          setOllamaStatus('error', data.message || 'Pull failed');
        }
      } catch (e) {
        setOllamaStatus('error', `Pull failed: ${e.message}`);
      }
    }

    async function testIntegration(key) {
      const values = collectIntegrationValues();

      try {
        const data = await requestIntegrationTest(key, values);
        currentSettings = values;
        integrationStatus[key] = data.ok;
        integrationVerboseResults[key] = {
          ...data,
          values,
          testedAt: new Date().toISOString()
        };
        renderIntegrations();
        renderVerboseOutput(key, integrationVerboseResults[key]);
        showFeedback('settings-feedback', data.ok ? data.message : `Error: ${data.message}`, data.ok);
      } catch (e) {
        showFeedback('settings-feedback', 'Test failed: ' + e.message, false);
      }
    }

    async function saveSettings() {
      const values = collectIntegrationValues();
      currentSettings = values;
      renderIntegrations();

      try {
        showFeedback('settings-feedback', 'Saving settings...', true);

        // Save all user-entered values (don't clear on failed tests)
        const savePayload = {};
        INTEGRATIONS.forEach(int => {
          int.fields.forEach(field => {
            savePayload[field.name] = String(values[field.name] || '').trim();
          });
        });

        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(savePayload)
        });
        const data = await res.json();

        if (data.status === 'ok') {
          currentSettings = data.values;
          renderIntegrations();

          // Test integrations after saving to update status
          showFeedback('settings-feedback', 'Settings saved. Testing connections...', true);
          const testResults = await computeIntegrationStatus(data.values);
          integrationStatus = testResults;
          renderIntegrations();

          const tested = Object.values(testResults).filter(v => v !== null).length;
          const passed = Object.values(testResults).filter(v => v === true).length;
          const failed = tested - passed;
          showFeedback(
            'settings-feedback',
            `Saved! ${passed}/${tested} integrations connected${failed > 0 ? ` (${failed} failed - check credentials)` : ''}.`,
            passed > 0 || tested === 0
          );
        } else {
          showFeedback('settings-feedback', 'Failed to save settings', false);
        }
      } catch (e) {
        showFeedback('settings-feedback', 'Save failed: ' + e.message, false);
      }
    }

      btn.disabled = true;
      btn.textContent = 'Loading...';

      try {
        const res = await fetch('/api/plex/library?limit=500');

    function renderPlexLibrary() {

    async function addSelectedPlex() {
      if (!selectedPlex.size) return;

      const btn = document.getElementById('add-selected-plex');
      btn.disabled = true;
      btn.textContent = 'Adding...';

      for (const movieId of selectedPlex) {
        const movie = plexMovies.find(m => m.movie_id === movieId);
        if (!movie) continue;

        try {
          await fetch('/api/seen', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              user_id: getUserId(),
              movie_id: movie.movie_id,
              title: movie.title,
              year: movie.year,
              source: 'plex'
            })
          });

      renderPlexLibrary();
      loadSeenMovies();

      btn.disabled = false;
      btn.textContent = 'Add Selected to Seen';

    function openServerModal(type, serverId = null) {

      document.getElementById('server-type').value = type;
      document.getElementById('server-edit-id').value = serverId || '';
      document.getElementById('server-key-label').textContent = type === 'plex' ? 'Token' : 'API Key';

      if (serverId) {
        const servers = type === 'plex' ? serversList.plex : serversList.radarr;
        const server = servers.find(s => s.id === serverId);
        if (server) {
          title.textContent = `Edit ${type === 'plex' ? 'Plex' : 'Radarr'} Server`;
          document.getElementById('server-name').value = server.name;
          document.getElementById('server-url').value = server.base_url;
          document.getElementById('server-key').value = '';
          document.getElementById('server-key').placeholder = server.api_key_masked || 'Enter new token';
          document.getElementById('server-default').checked = server.is_default;
        }
      } else {
        title.textContent = `Add ${type === 'plex' ? 'Plex' : 'Radarr'} Server`;
        form.reset();
        document.getElementById('server-default').checked = false;
      }

      feedback.innerHTML = '';
      modal.style.display = 'flex';
    }

    function closeServerModal() {
      document.getElementById('server-modal').style.display = 'none';
    }

    function editServer(serverId) {
      // Find which type
      let type = 'plex';
      if (serversList.radarr.find(s => s.id === serverId)) type = 'radarr';
      openServerModal(type, serverId);
    }

    document.getElementById('server-form').onsubmit = async (e) => {
      e.preventDefault();
      const feedback = document.getElementById('server-form-feedback');
      const type = document.getElementById('server-type').value;
      const editId = document.getElementById('server-edit-id').value;
      const name = document.getElementById('server-name').value.trim();
      const url = document.getElementById('server-url').value.trim();
      const key = document.getElementById('server-key').value.trim();
      const isDefault = document.getElementById('server-default').checked;

      console.log('Server form submit:', { type, editId, name, url, hasKey: !!key, isDefault });

      if (!name || !url) {
        feedback.innerHTML = '<div class="feedback error">Name and URL are required</div>';
        return;
      }

      try {
        let res;
        if (editId) {
          // Update existing
          const body = { name, base_url: url };
          if (key) body.api_key = key;
          console.log('Updating server:', editId, body);
          res = await fetch(`/api/servers/${editId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (isDefault) {
            await fetch(`/api/servers/${editId}/default`, { method: 'POST' });
          }
        } else {
          // Create new
          const payload = {
            service_type: type,
            name,
            base_url: url,
            api_key: key || null,
            is_default: isDefault
          };
          console.log('Creating server:', payload);
          res = await fetch('/api/servers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }

        const data = await res.json();
        console.log('Server response:', data);
        if (data.ok) {
          closeServerModal();
          loadServers();
        } else {
          feedback.innerHTML = `<div class="feedback error">${escapeHtml(data.message)}</div>`;
        }
      } catch (err) {
        console.error('Server form error:', err);
        feedback.innerHTML = `<div class="feedback error">Error: ${err.message}</div>`;
      }
    };

    async function deleteServer(serverId) {
      if (!confirm('Delete this server configuration?')) return;

      try {
        const res = await fetch(`/api/servers/${serverId}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          loadServers();
        } else {
          alert(data.message || 'Failed to delete');
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function setDefaultServer(serverId) {
      try {
        const res = await fetch(`/api/servers/${serverId}/default`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          loadServers();
        } else {
          alert(data.message || 'Failed to set default');
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function testServer(serverId) {
      const row = document.querySelector(`[data-server-id="${serverId}"]`);
      const badge = row?.querySelector('.status-badge');
      if (badge) {
        badge.textContent = 'Testing...';
        badge.className = 'status-badge pending';
      }

      try {
        const res = await fetch(`/api/servers/${serverId}/test`, { method: 'POST' });
        const data = await res.json();
        if (badge) {
          if (data.ok) {
            badge.textContent = data.message || 'Connected';
            badge.className = 'status-badge success';
          } else {
            badge.textContent = data.message || 'Failed';
            badge.className = 'status-badge error';
          }
        }
      } catch (e) {
        if (badge) {
          badge.textContent = 'Error';
          badge.className = 'status-badge error';
        }
      }
    }
  </script>
</body>
</html>
